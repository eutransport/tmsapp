# ===========================================
# TMS - Transport Management System
# Production Docker Compose
# ===========================================
# 
# Dit bestand wordt automatisch geconfigureerd
# door install.sh. Handmatig aanpassen kan ook.
#
# Services:
# - db: PostgreSQL database
# - redis: Cache server  
# - backend: Django API
# - frontend: React app
# - celery-worker: Celery background task worker
# - celery-beat: Celery periodic task scheduler
# - npm: Nginx Proxy Manager (UI op poort 81)
# - portainer: Container beheer (UI op poort 9443)
# ===========================================

services:
  # =========================================
  # PostgreSQL Database
  # =========================================
  db:
    image: postgres:16-alpine
    container_name: tms_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-tms_db}
      POSTGRES_USER: ${DB_USER:-tms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database wachtwoord is verplicht}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tms_user} -d ${DB_NAME:-tms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 256M
    networks:
      - tms_internal

  # =========================================
  # Redis Cache
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: tms_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?Redis wachtwoord is verplicht} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 384M
    networks:
      - tms_internal

  # =========================================
  # Django Backend API
  # =========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tms_backend
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DJANGO_SETTINGS_MODULE=tms.settings.production
      - SECRET_KEY=${SECRET_KEY:?Secret key is verplicht}
      - DB_NAME=${DB_NAME:-tms_db}
      - DB_USER=${DB_USER:-tms_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ALLOWED_HOSTS=${DOMAIN_NAME:-localhost},localhost,backend
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN_NAME:-localhost},http://localhost
      - SECURE_SSL_REDIRECT=false
      - SESSION_COOKIE_SECURE=true
      - CSRF_COOKIE_SECURE=true
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    group_add:
      - "0"  # root group for Docker socket access
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - tms_internal
      - tms_external
    expose:
      - "8000"

  # =========================================
  # React Frontend
  # =========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: tms_frontend
    restart: always
    volumes:
      - media_files:/usr/share/nginx/html/media:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - tms_internal
    expose:
      - "80"

  # =========================================
  # Celery Worker - Background task processing
  # =========================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tms_celery_worker
    restart: always
    command: celery -A tms worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DJANGO_SETTINGS_MODULE=tms.settings.production
      - SECRET_KEY=${SECRET_KEY:?Secret key is verplicht}
      - DB_NAME=${DB_NAME:-tms_db}
      - DB_USER=${DB_USER:-tms_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ALLOWED_HOSTS=${DOMAIN_NAME:-localhost},localhost,backend
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN_NAME:-localhost},http://localhost
    volumes:
      - media_files:/app/media
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - tms_internal
      - tms_external

  # =========================================
  # Celery Beat - Periodic task scheduler
  # =========================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tms_celery_beat
    restart: always
    # Persist beat's last-run schedule file so restarts don't re-fire tasks.
    # Keeps using code-defined beat_schedule (in tms/celery.py) — do NOT switch
    # to django-celery-beat DatabaseScheduler; that would silently ignore the
    # code-defined schedule and require Admin-driven re-configuration.
    command: celery -A tms beat --loglevel=info --schedule=/app/celerybeat/celerybeat-schedule
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DJANGO_SETTINGS_MODULE=tms.settings.production
      - SECRET_KEY=${SECRET_KEY:?Secret key is verplicht}
      - DB_NAME=${DB_NAME:-tms_db}
      - DB_USER=${DB_USER:-tms_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ALLOWED_HOSTS=${DOMAIN_NAME:-localhost},localhost,backend
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN_NAME:-localhost},http://localhost
    volumes:
      - logs:/app/logs
      - celery_beat_schedule:/app/celerybeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - tms_internal
      - tms_external

  # =========================================
  # Maintenance pagina
  # Altijd actief — NPM valt hier op terug bij 502/503/504
  # (frontend container down tijdens update)
  # NOOIT herbouwen tijdens app-updates!
  # =========================================
  maintenance:
    image: nginx:alpine
    container_name: tms_maintenance
    restart: always
    volumes:
      - ./frontend/public/maintenance.html:/usr/share/nginx/html/index.html:ro
      - ./docker/maintenance-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tms_internal
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # =========================================
  # Nginx Proxy Manager
  # UI: http://server-ip:81  (bescherm poort 81 via firewall — UFW/iptables)
  # Beheert SSL en reverse proxy op 80/443
  # =========================================
  # NOTE: image is gepind om onbedoelde downgrade/upgrade te voorkomen.
  # Bij het upgraden: check de release notes eerst — NPM's SQLite migreert
  # niet altijd achterwaarts compatibel.
  npm:
    image: 'jc21/nginx-proxy-manager:2.15.1'
    container_name: tms_npm
    restart: always
    ports:
      - '80:80'      # HTTP  (publiek voor HTTP→HTTPS redirect + ACME)
      - '443:443'    # HTTPS (publiek voor reverse-proxy traffic)
      - '81:81'      # Admin UI — beperk toegang via host-firewall (UFW allow from <IP> to any port 81)
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
      - DISABLE_IPV6=true
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - tms_internal
      - tms_external
    depends_on:
      # service_started (niet service_healthy): NPM moet ook opkomen als de
      # backend nog aan het migreren is — anders krijg je een deadlock waarbij
      # niets bereikbaar is en de maintenance-pagina niet getoond kan worden.
      backend:
        condition: service_started
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================
  # Portainer - Container Management
  # UI: https://server-ip:9443
  # =========================================
  portainer:
    image: portainer/portainer-ce:2.39.4
    container_name: tms_portainer
    restart: always
    ports:
      - '9443:9443'  # HTTPS UI
      - '8000:8000'  # Edge agent (optioneel)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - tms_external

# =========================================
# Volumes
# =========================================
volumes:
  postgres_data:
    name: tms_postgres_data
  redis_data:
    name: tms_redis_data
  static_files:
    name: tms_static_files
  media_files:
    name: tms_media_files
  logs:
    name: tms_logs
  npm_data:
    name: tms_npm_data
  npm_letsencrypt:
    name: tms_npm_letsencrypt
  portainer_data:
    name: tms_portainer_data
  celery_beat_schedule:
    name: tms_celery_beat_schedule

# =========================================
# Networks
# =========================================
networks:
  tms_internal:
    name: tms_internal
    driver: bridge
    internal: true  # Geen externe toegang
  tms_external:
    name: tms_external
    driver: bridge
